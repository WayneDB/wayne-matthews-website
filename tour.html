            <div class="kit-form">

                    <div class="formkit-fields">
                        <input class="formkit-input" name="email_address" type="email" placeholder="Email Address" required>
                        <button class="formkit-submit">
                            <span>Notify me</span>

                    </div>
                </form>
            </div>
        </section>
