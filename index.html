<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayne Matthews | Official Website</title>

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <script src="scripts/sender.js" defer></script>

</head>

<body class="theme-dark">
    <div data-component="templates"></div>
    <div data-component="header"></div>

    <main>
        
        <section class="hero">
            <div class="overlay"></div>
            <div class="hero-content" style="transform: translateY(100px);">
                <div class="content" style="transform: translateY(40px);">
                    <h1>Wayne Matthews</h1>
                    <h2>Singer • Songwriter</h2>
                    <p>New music. New stories. Coming soon.</p>
                </div>
            </div>
        </section>

        <section class="section">
                <h3>Join the mailing list</h3>
                <p>Be the first to hear about new music, live shows and more.</p>
                <button id="subscribebutton" class="button">Subscribe</button>
        </section>

        <div class="links-divider"></div>
        <section class="section">
            <div class="section-heading">
                <h2>Latest Release</h2>
            </div>
            <div data-render="featured-release"></div>
        </section>

        <div class="links-divider"></div>
        <section class="section">
                <div class="section-heading">
                    <h2>Music</h2>
                </div>
                <div class="grid grid--auto" data-render="releases" data-limit="5"></div>
        </section>

        <div class="links-divider"></div>
        <section class="section">
                <div class="section-heading">
                    <h2>Tour Dates</h2>
                </div>
                <div data-render="tour-dates" data-limit="5"></div>
        </section>

        <!--<section class="section">
                <div class="section-heading">
                    <h2>Newsletter</h2>
                </div>
                <p>Be the first to hear about new music, live shows and more.</p>
                <button id="subscribebutton" class="button">Subscribe</button>
        </section>-->

    </main>

    <div data-component="footer"></div>

<script src="scripts/script.js"></script>
</body>
</html>
