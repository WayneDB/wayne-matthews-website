<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayne Matthews | Official Website</title>

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <script src="scripts/sender.js" defer></script>

</head>

<body class="theme-dark">
    <div data-component="templates"></div>
    <div data-component="header"></div>
    <div class="herofade" style="position: absolute; transform: translateX(40px);">
        <div class="socials" data-render="socials"></div>
    </div>

    <main>
        <div class="hero" id="home">
            <div class="hero-image"></div>
            <video class="hero-video" autoplay muted loop playsinline preload="auto" poster="images/background.jpg">
                <source src="videos/background.mp4" type="video/mp4">
            </video>
            <div class="hero-content" style="transform: translateY(100px);">
                <div class="stack">
                    <h1 class="herofade" style="transform: translateY(40px);">Wayne Matthews</h1>
                    <p class="herofade lead eyebrow" style="transform: translateY(60px);">Singer • Songwriter</p>
                    <p class="herofade lead" style="transform: translateY(70px);">New music. New stories. Coming soon.</p>
                </div>
            </div>
            <div class="overlay"></div>
        </div>

        <section>
                <h2>Join the mailing list</h2>
                <p>Be the first to hear about new music, live shows and more.</p>
                <button id="subscribebutton">Subscribe</button>
        </section>

        <div class="divider"></div>
        <section>
            <h1>Latest Release</h1>
            <div data-render="featured-release"></div>
        </section>

        <div class="divider"></div>
        <section id="music">
            <h1>Music</h1>
            <div class="grid grid--auto" data-render="releases" data-limit="5"></div>
        </section>

        <div class="divider"></div>
        <section id="tour">
            <h1>Tour Dates</h1>
            <div data-render="tour-dates" data-limit="5"></div>
        </section>

    </main>

    <div data-component="footer"></div>

<script src="scripts/script.js"></script>
</body>
</html>
