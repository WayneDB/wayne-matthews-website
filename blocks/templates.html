<!-- Social Icon Template -->
<template id="social-icon-template">
    <a href="#" target="_blank" data-field="link">
        <i class="fa-brands" data-field="icon"></i>
    </a>
</template>

<!-- Release Card Template -->
<template id="release-card-template">
    <a class="card stack" href="#" target="_blank" data-field="link">
        <img class="cover-img" src="" alt="" data-field="cover">
        <div class="stack gap-xs pad-sm">
            <p class="eyebrow" data-field="type"></p>
            <p data-field="title"></p>
            <p class="muted" data-field="year"></p>
        </div>
    </a>
</template>

<!-- Featured Release Template -->
<template id="featured-release-template">
    <div class="row gap-md">
        <img class="cover-img" src="" alt="" data-field="cover">
        <div class="stack gap-sm">
            <p class="eyebrow" data-field="year"></p>
            <h3 data-field="title"></h3>
            <a class="button" href="#" target="_blank" data-field="link">Listen</a>
        </div>
    </div>
</template>

<!-- Tour Date Template -->
<template id="tour-date-template">
    <div class="card row gap-sm pad-sm">
        <div class="stack gap-xs">
            <p class="eyebrow" data-field="date"></p>
            <div class="row gap-xs">
                <h3 data-field="title"></h3>
                <p>|</p>
                <p data-field="location"></p>
            </div>
        </div>
        <a class="button" href="#" target="_blank" data-field="link">More info</a>
    </div>
</template>
